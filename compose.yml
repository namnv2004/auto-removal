name: object-removal-demo

x-backend-environment: &backend-environment
  PROJECT_NAME: ${PROJECT_NAME:-Object Removal Demo}
  FRONTEND_HOST: ${FRONTEND_HOST:-http://localhost:5173}
  ENVIRONMENT: ${ENVIRONMENT:-local}
  BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost,http://localhost:5173,https://localhost,https://localhost:5173}
  SECRET_KEY: ${SECRET_KEY:-changethis}
  FIRST_SUPERUSER: ${FIRST_SUPERUSER:-admin@example.com}
  FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD:-changethis}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_TLS: ${SMTP_TLS:-true}
  SMTP_SSL: ${SMTP_SSL:-false}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  EMAILS_FROM_EMAIL: ${EMAILS_FROM_EMAIL:-info@example.com}
  POSTGRES_SERVER: db
  POSTGRES_PORT: 5432
  POSTGRES_DB: ${POSTGRES_DB:-app}
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changethis}
  SENTRY_DSN: ${SENTRY_DSN:-}

services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changethis}
    volumes:
      - app-db-data:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  prestart:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: bash scripts/prestart.sh
    depends_on:
      db:
        condition: service_healthy
    environment: *backend-environment

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      prestart:
        condition: service_completed_successfully
    environment: *backend-environment
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import urllib.request
          urllib.request.urlopen("http://localhost:8000/api/v1/utils/health-check/", timeout=5).read()
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  app-db-data:
