name: object-removal

x-backend-environment: &backend-environment
  PROJECT_NAME: ${PROJECT_NAME:-Object Removal}
  FRONTEND_HOST: ${FRONTEND_HOST:-http://${DOMAIN:-localhost}:${FRONTEND_PORT:-5173}}
  ENVIRONMENT: ${ENVIRONMENT:-local}
  BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost,http://localhost:${FRONTEND_PORT:-5173},http://${DOMAIN:-localhost},http://${DOMAIN:-localhost}:${FRONTEND_PORT:-5173},https://localhost,https://localhost:${FRONTEND_PORT:-5173},https://${DOMAIN:-localhost},https://${DOMAIN:-localhost}:${FRONTEND_PORT:-5173},http://100.110.249.126:5173,http://100.110.249.126:5000}
  SECRET_KEY: ${SECRET_KEY:-changethis}
  FIRST_SUPERUSER: ${FIRST_SUPERUSER:-admin@example.com}
  FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD:-changethis}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_TLS: ${SMTP_TLS:-true}
  SMTP_SSL: ${SMTP_SSL:-false}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  EMAILS_FROM_EMAIL: ${EMAILS_FROM_EMAIL:-info@example.com}
  POSTGRES_SERVER: db
  POSTGRES_PORT: 5432
  POSTGRES_DB: ${POSTGRES_DB:-app}
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changethis}
  SENTRY_DSN: ${SENTRY_DSN:-}
  MODEL_DEVICE: ${MODEL_DEVICE:-cuda}
  SEGMENTATION_MODEL: ${SEGMENTATION_MODEL:-sam3.1}
  MODEL_CACHE_DIR: /models
  SAM31_CHECKPOINT_PATH: ${SAM31_CHECKPOINT_PATH:-/models/sam3.1_multiplex.pt}
  MAX_IMAGE_MB: ${MAX_IMAGE_MB:-20}
  MAX_LONG_EDGE: ${MAX_LONG_EDGE:-4096}
  INPAINTING_MODEL: ${INPAINTING_MODEL:-jixin0101/ObjectClear}
  INPAINTING_STEPS: ${INPAINTING_STEPS:-20}
  INPAINTING_GUIDANCE_SCALE: ${INPAINTING_GUIDANCE_SCALE:-2.5}
  INPAINTING_STRENGTH: ${INPAINTING_STRENGTH:-1.0}
  MASK_DILATION_PX: ${MASK_DILATION_PX:-4}
  MASK_FEATHER_RADIUS: ${MASK_FEATHER_RADIUS:-2.0}
  HF_TOKEN: ${HF_TOKEN:-}
  HF_HOME: /root/.cache/huggingface


services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changethis}
    ports:
      - "${DB_BIND_HOST:-127.0.0.1}:${DB_PORT:-5432}:5432"
    volumes:
      - app-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  prestart:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: bash scripts/prestart.sh
    depends_on:
      db:
        condition: service_healthy
    environment: *backend-environment

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command:
      - fastapi
      - dev
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload-dir
      - app
      - app/main.py
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      prestart:
        condition: service_completed_successfully
    environment:
      <<: *backend-environment
      WATCHFILES_FORCE_POLLING: ${WATCHFILES_FORCE_POLLING:-true}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    ports:
      - "${BACKEND_BIND_HOST:-0.0.0.0}:${BACKEND_PORT:-5000}:8000"
    gpus: all
    volumes:
      - ${MODEL_DIR:-./models}:/models:ro
      - ${HF_HOME:-./models/.cache}:/root/.cache/huggingface
      - ./backend/app:/app/backend/app
      - ./backend/scripts:/app/backend/scripts
      - ./backend/tests:/app/backend/tests
      - ./backend/alembic.ini:/app/backend/alembic.ini:ro
    develop:
      watch:
        - action: rebuild
          path: ./backend/Dockerfile
        - action: rebuild
          path: ./backend/pyproject.toml
        - action: rebuild
          path: ./pyproject.toml
        - action: rebuild
          path: ./uv.lock
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import urllib.request
          urllib.request.urlopen("http://localhost:8000/api/v1/utils/health-check/", timeout=5).read()
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: build-stage
    command:
      - npm
      - run
      - dev
      - --
      - --host
      - 0.0.0.0
      - --port
      - "5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-}
      VITE_BACKEND_PROXY_TARGET: ${VITE_BACKEND_PROXY_TARGET:-http://backend:8000}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_BIND_HOST:-0.0.0.0}:${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend/src:/app/frontend/src
      - ./frontend/public:/app/frontend/public
      - ./frontend/index.html:/app/frontend/index.html
      - ./frontend/vite.config.ts:/app/frontend/vite.config.ts
    develop:
      watch:
        - action: rebuild
          path: ./frontend/Dockerfile
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/package-lock.json

volumes:
  app-db-data:
