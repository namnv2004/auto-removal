apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: object-removal-demo
  labels:
    app.kubernetes.io/name: object-removal-demo
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: object-removal-demo
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: object-removal-demo
        app.kubernetes.io/component: backend
    spec:
      initContainers:
        - name: prestart
          image: object-removal-demo-backend:latest
          imagePullPolicy: Never
          command:
            - bash
            - scripts/prestart.sh
          envFrom:
            - configMapRef:
                name: backend-env
            - secretRef:
                name: backend-secrets
      containers:
        - name: backend
          image: object-removal-demo-backend:latest
          imagePullPolicy: Never
          resources:
            limits:
              nvidia.com/gpu: "1"
              memory: "24Gi"
              cpu: "8"
            requests:
              nvidia.com/gpu: "1"
              memory: "12Gi"
              cpu: "4"
          command:
            - fastapi
            - run
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - app/main.py
          envFrom:
            - configMapRef:
                name: backend-env
            - secretRef:
                name: backend-secrets
          ports:
            - name: http
              containerPort: 8000
          volumeMounts:
            - name: models-volume
              mountPath: /models
          startupProbe:
            httpGet:
              path: /api/v1/utils/health-check/
              port: http
            periodSeconds: 15
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /api/v1/utils/health-check/
              port: http
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/utils/health-check/
              port: http
            periodSeconds: 20
            failureThreshold: 5
      volumes:
        - name: models-volume
          hostPath:
            path: /models
            type: Directory

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: object-removal-demo
  labels:
    app.kubernetes.io/name: object-removal-demo
    app.kubernetes.io/component: backend
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: object-removal-demo
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 8000
      targetPort: http
      nodePort: 30080
